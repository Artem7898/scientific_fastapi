name: Publish to Zenodo on Release


on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Официальное действие от Zenodo для создания снапшота
      - name: Create Zenodo snapshot
        uses: zenodraft/v1.1@v1
        with:
          zenodo-token: ${{ secrets.ZENODO_TOKEN }}
          sandbox: false